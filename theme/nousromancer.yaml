# Nousromancer — Hermes dashboard theme + Now Bar companion
# Copy to ~/.hermes/dashboard-themes/nousromancer.yaml and pair with the
# nousromancer-mission-control dashboard plugin for the full hackathon build.
name: nousromancer
label: "Nousromancer"
description: "A black technical ledger for Hermes Dashboard: ACRONYM-like labeling discipline, Veilance restraint, and operational color only where state matters."

palette:
  background:
    hex: "#030303"
    alpha: 1.0
  midground:
    hex: "#E8E8E2"
    alpha: 1.0
  foreground:
    hex: "#8EA0A8"
    alpha: 0.78
  warmGlow: "rgba(216, 166, 186, 0.08)"
  noiseOpacity: 0.08

typography:
  fontSans: '"Geist", "Inter", "Helvetica Neue", Arial, system-ui, sans-serif'
  fontMono: '"Ioskeley Mono", "Geist Mono", "JetBrains Mono", "SFMono-Regular", ui-monospace, monospace'
  fontDisplay: '"Ioskeley Mono", "Geist Mono", "JetBrains Mono", ui-monospace, monospace'
  fontUrl: "https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap"
  baseSize: "14px"
  lineHeight: "1.52"
  letterSpacing: "0.004em"

layout:
  radius: "0.45rem"
  density: "compact"

# Standard layout avoids left-rail collisions with other cockpit/sidebar plugins.
layoutVariant: standard

assets:
  bg: "linear-gradient(180deg, #030303 0%, #060606 58%, #020202 100%)"
  hero: "linear-gradient(135deg, rgba(232, 232, 226, 0.06), rgba(142, 160, 168, 0.04)), linear-gradient(180deg, #050505, #020202)"
  crest: "linear-gradient(135deg, rgba(216, 166, 186, 0.12), rgba(142, 160, 168, 0.06))"
  custom:
    ledgerRule: "linear-gradient(90deg, rgba(232, 232, 226, 0.18), transparent 72%)"

componentStyles:
  card:
    background: "rgba(8, 8, 8, 0.94)"
    borderColor: "rgba(232, 232, 226, 0.12)"
    boxShadow: "none"
    backdropFilter: "none"
  header:
    background: "rgba(3, 3, 3, 0.94)"
    borderColor: "rgba(232, 232, 226, 0.12)"
    boxShadow: "0 1px 0 rgba(232, 232, 226, 0.08)"
  sidebar:
    background: "rgba(3, 3, 3, 0.94)"
    borderColor: "rgba(232, 232, 226, 0.10)"
    boxShadow: "none"
  tab:
    background: "rgba(232, 232, 226, 0.035)"
    borderColor: "rgba(232, 232, 226, 0.10)"
  badge:
    background: "rgba(232, 232, 226, 0.045)"
    borderColor: "rgba(232, 232, 226, 0.12)"
  progress:
    background: "linear-gradient(90deg, #D8A6BA 0%, #8EA0A8 100%)"
  backdrop:
    backgroundSize: "cover"
    backgroundPosition: "center"
    fillerOpacity: "0.08"
    fillerBlendMode: "normal"
  footer:
    background: "rgba(3, 3, 3, 0.92)"
  page:
    background: "transparent"

colorOverrides:
  card: "rgba(8, 8, 8, 0.94)"
  cardForeground: "#E8E8E2"
  popover: "rgba(6, 6, 6, 0.96)"
  popoverForeground: "#E8E8E2"
  primary: "#D8A6BA"
  primaryForeground: "#030303"
  secondary: "rgba(232, 232, 226, 0.055)"
  secondaryForeground: "#D6D6CE"
  muted: "rgba(232, 232, 226, 0.045)"
  mutedForeground: "#85857D"
  accent: "#8EA0A8"
  accentForeground: "#030303"
  destructive: "#C7808D"
  destructiveForeground: "#030303"
  success: "#9FB8A7"
  warning: "#C2A16A"
  border: "rgba(232, 232, 226, 0.12)"
  input: "rgba(232, 232, 226, 0.14)"
  ring: "#8EA0A8"

customCSS: |
  :root[data-layout-variant="standard"] body {
    background: #030303;
    color: #e8e8e2;
    font-feature-settings: "tnum" 1, "ss01" 1;
    scrollbar-color: rgba(232, 232, 226, 0.16) transparent;
    scrollbar-width: thin;
    text-rendering: geometricPrecision;
  }

  :root[data-layout-variant="standard"] ::-webkit-scrollbar {
    height: 8px;
    width: 8px;
  }

  :root[data-layout-variant="standard"] ::-webkit-scrollbar-track {
    background: transparent;
  }

  :root[data-layout-variant="standard"] ::-webkit-scrollbar-thumb {
    background: rgba(232, 232, 226, 0.16);
    border: 2px solid #030303;
    border-radius: 999px;
  }

  :root[data-layout-variant="standard"] ::-webkit-scrollbar-thumb:hover {
    background: rgba(232, 232, 226, 0.24);
  }

  :root[data-layout-variant="standard"] body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background:
      linear-gradient(180deg, rgba(232, 232, 226, 0.026), transparent 18rem),
      linear-gradient(90deg, transparent 0%, rgba(232, 232, 226, 0.018) 50%, transparent 100%);
    mix-blend-mode: normal;
  }

  :root[data-layout-variant="standard"] h1,
  :root[data-layout-variant="standard"] h2,
  :root[data-layout-variant="standard"] h3,
  :root[data-layout-variant="standard"] .font-serif {
    font-family: var(--theme-font-display, "Geist Mono", ui-monospace, monospace);
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  :root[data-layout-variant="standard"] nav a,
  :root[data-layout-variant="standard"] nav button,
  :root[data-layout-variant="standard"] .font-mondwest,
  :root[data-layout-variant="standard"] .font-compressed,
  :root[data-layout-variant="standard"] .font-courier,
  :root[data-layout-variant="standard"] table th,
  :root[data-layout-variant="standard"] [role="columnheader"] {
    font-family: var(--theme-font-mono, "Geist Mono", ui-monospace, monospace) !important;
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.11em;
    text-transform: uppercase;
  }

  :root[data-layout-variant="standard"] .font-sans {
    font-family: var(--theme-font-sans, "Geist", system-ui, sans-serif) !important;
  }

  :root[data-layout-variant="standard"] table td,
  :root[data-layout-variant="standard"] [role="cell"] {
    font-size: 0.78rem;
    letter-spacing: 0.004em;
  }

  :root[data-layout-variant="standard"] main .text-sm.truncate {
    color: #e8e8e2;
    font-family: var(--theme-font-sans, "Geist", system-ui, sans-serif) !important;
    font-size: 0.84rem;
    font-weight: 500;
    letter-spacing: 0.006em;
    text-transform: none;
  }

  :root[data-layout-variant="standard"] main .text-xs {
    font-family: var(--theme-font-mono, "Geist Mono", ui-monospace, monospace) !important;
    font-size: 0.69rem;
    letter-spacing: 0.04em;
    text-transform: none;
  }

  :root[data-layout-variant="standard"] main .text-xs.text-muted-foreground {
    color: #9a9a92 !important;
  }

  :root[data-layout-variant="standard"] main input {
    background: rgba(8, 8, 8, 0.76) !important;
    border-color: rgba(232, 232, 226, 0.18) !important;
    color: #e8e8e2;
    font-family: var(--theme-font-sans, "Geist", system-ui, sans-serif) !important;
    text-transform: none;
  }

  :root[data-layout-variant="standard"] main .font-compressed {
    background: transparent !important;
    border-color: rgba(232, 232, 226, 0.10) !important;
    color: #85857d !important;
  }

  :root[data-layout-variant="standard"] .border-border {
    border-color: rgba(232, 232, 226, 0.12) !important;
    box-shadow: none;
  }

  :root[data-layout-variant="standard"] .text-muted-foreground {
    color: #85857d !important;
  }

  :root[data-layout-variant="standard"] ::selection {
    background: rgba(216, 166, 186, 0.28);
    color: #030303;
  }
